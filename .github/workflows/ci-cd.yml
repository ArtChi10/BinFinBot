name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Ruff check
        run: python -m ruff check .

      - name: Compile Python files
        run: python -m compileall src tests

      - name: Unit tests
        run: python -m unittest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      SSH_HOST: ${{ secrets.DEPLOY_HOST }}
      SSH_USER: ${{ secrets.DEPLOY_USER }}
      SSH_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'binfinbot' }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'binfinbot' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_PRIVATE_KEY"
          test -n "$DEPLOY_PATH"
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$POSTGRES_PASSWORD"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Package source
        run: |
          tar \
            --exclude=.git \
            --exclude=.env \
            --exclude=.venv \
            --exclude=venv \
            --exclude=data \
            --exclude=local_notes \
            -czf /tmp/binfinbot.tar.gz .

      - name: Upload source and environment
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$DEPLOY_PATH'"

          cat > /tmp/binfinbot.env <<EOF
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          EOF

          scp -P "$SSH_PORT" -i ~/.ssh/deploy_key \
            /tmp/binfinbot.tar.gz "$SSH_USER@$SSH_HOST:/tmp/binfinbot.tar.gz"

          scp -P "$SSH_PORT" -i ~/.ssh/deploy_key \
            /tmp/binfinbot.env "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/.env"

      - name: Deploy with Docker Compose
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" <<EOF
          set -euo pipefail
          tar -xzf /tmp/binfinbot.tar.gz -C "$DEPLOY_PATH"
          rm -f /tmp/binfinbot.tar.gz
          chmod 600 "$DEPLOY_PATH/.env"
          cd "$DEPLOY_PATH"
          docker compose up -d --build
          docker compose ps
          EOF
